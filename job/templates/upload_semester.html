<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Semester Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .upload-card {
            max-width: 600px;
            margin: 60px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            background: #ffffff;
        }

        .title-text {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn-upload {
            width: 100%;
        }
    </style>
</head>
<body style="background-color: #f5f7fa;">

<div class="container">
    <div class="upload-card">

        <h3 class="text-center title-text">Upload Semester Result PDF</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Semester Input -->
            <div class="mb-3">
                <label class="form-label">Semester Number</label>
                <input type="number"
                       name="semester"
                       class="form-control"
                       placeholder="Enter Semester (e.g. 7)"
                       required>
            </div>

            <!-- PDF Upload -->
            <div class="mb-3">
                <label class="form-label">Select PDF File</label>
                <input type="file"
                       name="pdf_file"
                       class="form-control"
                       accept=".pdf"
                       required>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary btn-upload">
                Upload & Import
            </button>

        </form>

        <hr class="my-4">

        <div class="text-center">
            <a href="{% url 'export_excel' %}" class="btn btn-success">
                Download Excel Report
            </a>
        </div>

    </div>
</div>

</body>
</html>
